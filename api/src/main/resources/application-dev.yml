# Dev profile (SPRING_PROFILES_ACTIVE=dev — docker-compose sets this for the api
# service): verbose app logging + the local-dev Hive client secret. No datasource
# block — the base application.yml's spring.mongodb.uri default already targets
# local dev, migrations are Spring Data-native (T089/T091), and v1 has no demo seed
# (rule-set definitions are bundled resources — research §Migrations).
logging:
  level:
    no.rauboti.tome: DEBUG

# Local-dev OAuth client secret for the Hive login flow (Authorization-Code + PKCE,
# used from T009). Matches the client_secret_hash seeded for the `tome` app in
# hive's demo data (its SHA-256). Local-dev only, non-sensitive — real
# environments inject HIVE_CLIENT_SECRET via env.
tome:
  hive:
    client-secret: tome-local-dev
