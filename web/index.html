<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tome</title>
    <script>
      // Set the colour-mode class before first paint to avoid a flash of the
      // wrong theme. Mirrors next-themes (storage key "theme", class attribute)
      // used by @rauboti/ui's ThemeProvider; next-themes reconciles on mount
      // without changing an already-correct class.
      ;(function () {
        try {
          var stored = localStorage.getItem('theme')
          var theme =
            stored && stored !== 'system'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.classList.add(theme)
          document.documentElement.style.colorScheme = theme
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
