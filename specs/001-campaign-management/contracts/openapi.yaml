openapi: 3.1.0
info:
  title: Tome API — Campaign & Character Management
  version: 0.1.0
  description: >
    BFF API for Tome v1 (feature 001-campaign-management). All endpoints require an authenticated
    session (Hive OAuth via the BFF; session cookie). Authorization is enforced server-side on every
    read/write and mirrored on the SSE stream. Sheet `data` is a **typed, discriminated union** keyed
    by `ruleSetId` (ADR-001): each rule set has its own typed sheet schema (see `Sheet` / `DnD35Sheet`),
    the codegen source for the web's sheet types. Derived values are `readOnly` — present in responses
    (computed on read), ignored on write, never stored. Mutable aggregates use optimistic concurrency:
    send the `version` you read; a stale write returns 409.
servers:
  - url: /api
security:
  - sessionCookie: []

paths:
  /auth/me:
    get:
      summary: Current user and Tome roles
      responses:
        "200":
          description: Authenticated principal
          content:
            application/json:
              schema:
                type: object
                required: [userId, roles]
                properties:
                  userId: { type: string, description: Hive subject }
                  displayName: { type: string, nullable: true }
                  roles:
                    type: array
                    items: { type: string, enum: [admin, user] }
                  locale: { type: string, enum: [nb, en], nullable: true, description: "null when the user has set no locale" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/logout:
    post:
      summary: End the session
      responses:
        "204": { description: Logged out }

  /rule-sets:
    get:
      summary: List available rule sets (v1 returns dnd35 only)
      responses:
        "200":
          description: Rule sets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RuleSetSummary" }
  /rule-sets/{ruleSetId}:
    get:
      summary: >-
        One rule set's summary (id + name) for the create-character picker. ADR-001: the sheet is a
        typed schema (`DnD35Sheet`) known to the client, not a definition fetched to drive a generic
        renderer — so this no longer returns a `SheetDefinition`.
      parameters: [ { $ref: "#/components/parameters/RuleSetId" } ]
      responses:
        "200":
          description: Rule set summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuleSetSummary" }
        "404": { $ref: "#/components/responses/NotFound" }

  /rule-sets/{ruleSetId}/catalogs/{catalog}:
    get:
      summary: >-
        Filtered option slice for a catalog-backed select (T112–T114) — e.g. the spells on a given
        class's list. A typed sheet component fetches this per filter value (ADR-001; this survives the
        typed-engine pivot — it replaces the former `SheetField.optionsFrom` definition descriptor).
      parameters:
        - { $ref: "#/components/parameters/RuleSetId" }
        - { name: catalog, in: path, required: true, schema: { type: string }, description: "catalog name, e.g. 'spells'" }
        - { name: filter, in: query, required: false, schema: { type: string }, description: "filter value (e.g. the casterClass) applied to the catalog" }
      responses:
        "200":
          description: The filtered options
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    value: { type: string, description: "stored value, e.g. the spell id" }
                    label: { type: string, description: "literal display label (catalog content is data, not an i18n key)" }
                    meta:
                      type: object
                      nullable: true
                      description: "optional per-option data, e.g. the spell's level for the filtered class"
        "404": { $ref: "#/components/responses/NotFound" }

  /characters:
    get:
      summary: List the caller's characters
      responses:
        "200":
          description: Characters owned by the caller
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CharacterSummary" }
    post:
      summary: Create a character for a rule set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ruleSetId, name]
              properties:
                ruleSetId: { type: string }
                name: { type: string }
                data: { type: object, description: "Initial base inputs for the rule set's `Sheet` (partial allowed; `readOnly` derived ignored). Loosely typed here (T118); **T124 tightens this to the typed `Sheet` union, enforced on both client and server** (unknown/mismatched `ruleSetId` → 400). Responses already carry the precise typed `Sheet` union." }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /characters/{characterId}:
    parameters: [ { $ref: "#/components/parameters/CharacterId" } ]
    get:
      summary: Get a character (owner, or DM of a campaign it belongs to)
      responses:
        "200":
          description: Character with computed derived values and any soft warnings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: Update a character sheet (optimistic concurrency)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version, data]
              properties:
                name: { type: string }
                data: { type: object, description: "Full base inputs for the rule set's `Sheet` (`readOnly` derived ignored). Loosely typed on the request; binding settled in T124. Responses carry the typed `Sheet` union." }
                version: { type: integer }
      responses:
        "200":
          description: Updated; body includes recomputed derived values and soft warnings (never blocks)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      summary: Delete a character (owner only; must not be in a campaign)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /campaigns:
    get:
      summary: Campaigns where the caller is DM or a player
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CampaignSummary" }
    post:
      summary: Create a campaign bound to a rule set (caller becomes DM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, ruleSetId]
              properties:
                name: { type: string }
                ruleSetId: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }
  /campaigns/{campaignId}:
    parameters: [ { $ref: "#/components/parameters/CampaignId" } ]
    get:
      summary: Campaign detail (DM sees full; player sees limited view)
      responses:
        "200":
          description: Role-aware campaign view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CampaignView" }
        "403": { $ref: "#/components/responses/Forbidden" }
    patch:
      summary: Update campaign (e.g. archive) — DM only, optimistic concurrency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                name: { type: string }
                status: { type: string, enum: [active, archived] }
                version: { type: integer }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/Campaign" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /campaigns/{campaignId}/members:
    parameters: [ { $ref: "#/components/parameters/CampaignId" } ]
    get:
      summary: Roster (DM full; player sees self + shared)
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Member" }
    post:
      summary: DM adds an existing character to the campaign (rule set must match)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [characterId]
              properties:
                characterId: { type: string, description: Owner-shared character id }
      responses:
        "201":
          description: Character added to roster
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Member" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Rule-set mismatch, or character already in a campaign
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /campaigns/{campaignId}/members/{membershipId}:
    parameters:
      - { $ref: "#/components/parameters/CampaignId" }
      - name: membershipId
        in: path
        required: true
        schema: { type: string }
    delete:
      summary: Remove a member (DM only); the character is not deleted
      responses:
        "204": { description: Removed }
        "403": { $ref: "#/components/responses/Forbidden" }

  /campaigns/{campaignId}/npcs:
    parameters: [ { $ref: "#/components/parameters/CampaignId" } ]
    get: { summary: List NPCs (DM only), responses: { "200": { description: NPCs, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Npc" } } } } }, "403": { $ref: "#/components/responses/Forbidden" } } }
    post:
      summary: Create an NPC under the campaign's rule set (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                data: { type: object, description: "Initial base inputs for the campaign rule set's `Sheet` (partial allowed; `readOnly` derived ignored). Loosely typed on the request; binding settled in T124. Responses carry the typed `Sheet` union." }
                isPrivate: { type: boolean, default: true }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Npc" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /campaigns/{campaignId}/npcs/{npcId}:
    parameters:
      - { $ref: "#/components/parameters/CampaignId" }
      - name: npcId
        in: path
        required: true
        schema: { type: string }
    put:
      summary: Update an NPC sheet (DM only, optimistic concurrency)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [version, data], properties: { name: { type: string }, data: { type: object, description: "Full base inputs for the campaign rule set's `Sheet` (`readOnly` derived ignored). Loosely typed on the request; binding settled in T124." }, isPrivate: { type: boolean }, version: { type: integer } } } } } }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/Npc" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      summary: Delete an NPC (DM only)
      responses: { "204": { description: Deleted }, "403": { $ref: "#/components/responses/Forbidden" } }

  /campaigns/{campaignId}/content:
    parameters: [ { $ref: "#/components/parameters/CampaignId" } ]
    get:
      summary: Notes/shared content (DM sees all; player sees only shared)
      responses:
        "200": { description: Content, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Content" } } } } }
    post:
      summary: Create content (DM only)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [title, visibility], properties: { title: { type: string }, body: { type: string }, visibility: { type: string, enum: [private, shared] } } } } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Content" } } } }, "403": { $ref: "#/components/responses/Forbidden" } }

  /campaigns/{campaignId}/sessions:
    parameters: [ { $ref: "#/components/parameters/CampaignId" } ]
    get: { summary: List sessions (DM only), responses: { "200": { description: Sessions, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Session" } } } } } } }
    post:
      summary: Create/record a session (DM only)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [title], properties: { title: { type: string }, scheduledFor: { type: string, format: date-time }, notes: { type: string } } } } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Session" } } } } }

  /campaigns/{campaignId}/sessions/{sessionId}/encounters:
    parameters:
      - { $ref: "#/components/parameters/CampaignId" }
      - { $ref: "#/components/parameters/SessionId" }
    post:
      summary: Start an encounter within a session with initiative-ordered combatants (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [combatants]
              properties:
                combatants:
                  type: array
                  items:
                    type: object
                    required: [combatantId, combatantType, initiative]
                    properties:
                      combatantId: { type: string, description: id of a character or an NPC }
                      combatantType: { type: string, enum: [character, npc] }
                      initiative: { type: integer }
                      isRevealed: { type: boolean, default: true }
      responses:
        "201": { description: Encounter started (status active), content: { application/json: { schema: { $ref: "#/components/schemas/Encounter" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /campaigns/{campaignId}/sessions/{sessionId}/encounters/{encounterId}/next-turn:
    parameters:
      - { $ref: "#/components/parameters/CampaignId" }
      - { $ref: "#/components/parameters/SessionId" }
      - { $ref: "#/components/parameters/EncounterId" }
    post:
      summary: Advance the turn/round (DM only); broadcast to revealed viewers via SSE
      responses:
        "200": { description: Updated encounter, content: { application/json: { schema: { $ref: "#/components/schemas/Encounter" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /campaigns/{campaignId}/sessions/{sessionId}/encounters/{encounterId}/end:
    parameters:
      - { $ref: "#/components/parameters/CampaignId" }
      - { $ref: "#/components/parameters/SessionId" }
      - { $ref: "#/components/parameters/EncounterId" }
    post:
      summary: End the encounter (DM only)
      responses: { "200": { description: Ended, content: { application/json: { schema: { $ref: "#/components/schemas/Encounter" } } } } }
  /campaigns/{campaignId}/sessions/{sessionId}/encounters/{encounterId}/combatants/{combatantId}:
    parameters:
      - { $ref: "#/components/parameters/CampaignId" }
      - { $ref: "#/components/parameters/SessionId" }
      - { $ref: "#/components/parameters/EncounterId" }
      - name: combatantId
        in: path
        required: true
        description: the combatant entry's own id (its `_id`, not the referenced character/npc id)
        schema: { type: string }
    patch:
      summary: Update a combatant mid-combat (DM only) — reveal/hide or adjust initiative
      description: Changing isRevealed drives the SSE fan-out (players see/lose the combatant live, FR-021)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isRevealed: { type: boolean }
                initiative: { type: integer }
      responses:
        "200": { description: Updated encounter, content: { application/json: { schema: { $ref: "#/components/schemas/Encounter" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  # A roll is appended to its container's rolls[] (campaign / session / encounter). The container is the
  # URL path — the stored Roll carries no scope ids. Three levels mirror the resource hierarchy.
  /campaigns/{campaignId}/rolls:
    parameters: [ { $ref: "#/components/parameters/CampaignId" } ]
    post:
      summary: Make a campaign-scoped roll (appended to campaign.rolls[])
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/RollRequest" } } } }
      responses:
        "201": { description: Recorded roll (also fanned out over SSE), content: { application/json: { schema: { $ref: "#/components/schemas/Roll" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /campaigns/{campaignId}/sessions/{sessionId}/rolls:
    parameters:
      - { $ref: "#/components/parameters/CampaignId" }
      - { $ref: "#/components/parameters/SessionId" }
    post:
      summary: Make a session-scoped roll (appended to session.rolls[])
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/RollRequest" } } } }
      responses:
        "201": { description: Recorded roll (also fanned out over SSE), content: { application/json: { schema: { $ref: "#/components/schemas/Roll" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /campaigns/{campaignId}/sessions/{sessionId}/encounters/{encounterId}/rolls:
    parameters:
      - { $ref: "#/components/parameters/CampaignId" }
      - { $ref: "#/components/parameters/SessionId" }
      - { $ref: "#/components/parameters/EncounterId" }
    post:
      summary: Make an encounter-scoped roll (appended to encounter.rolls[])
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/RollRequest" } } } }
      responses:
        "201": { description: Recorded roll (also fanned out over SSE), content: { application/json: { schema: { $ref: "#/components/schemas/Roll" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /campaigns/{campaignId}/stream:
    parameters: [ { $ref: "#/components/parameters/CampaignId" } ]
    get:
      summary: Subscribe to the campaign's live event stream (Server-Sent Events)
      description: >
        Returns `text/event-stream`. The server emits only events the subscriber is authorized to see
        (same PermissionService as REST). Event `type` values: `sheet.updated`, `content.updated`,
        `roster.updated`, `combat.updated`, `roll.created`. Each `data` payload is the authorized
        projection of the changed resource. Clients use `EventSource` (auto-reconnect).
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE frames; each event's data is a StreamEvent JSON object
        "403": { $ref: "#/components/responses/Forbidden" }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: TOME_SESSION
  parameters:
    RuleSetId: { name: ruleSetId, in: path, required: true, schema: { type: string } }
    CharacterId: { name: characterId, in: path, required: true, schema: { type: string } }
    CampaignId: { name: campaignId, in: path, required: true, schema: { type: string } }
    SessionId: { name: sessionId, in: path, required: true, schema: { type: string } }
    EncounterId: { name: encounterId, in: path, required: true, schema: { type: string } }
  responses:
    Unauthorized: { description: Not authenticated, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    Forbidden: { description: Authenticated but not authorized, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    NotFound: { description: Not found, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    BadRequest: { description: Invalid request, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    Conflict: { description: Stale version or constraint conflict (optimistic concurrency), content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
  schemas:
    Problem:
      type: object
      description: RFC-7807 problem detail
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
    RuleWarning:
      type: object
      properties:
        code: { type: string }
        field: { type: string, nullable: true, description: "null for a sheet-wide warning" }
        message: { type: string }
    RuleSetSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
    # ── Rule-set sheets (typed, discriminated) — ADR-001 ──────────────────────────────────────
    # `data` on Character/Npc is a discriminated union keyed by `ruleSetId`. Each rule set has a typed
    # sheet schema: base inputs plus `readOnly` derived values (computed on read, never stored — the
    # write-time strip is gone; a getter-only computed property is simply never persisted). This block
    # is the codegen source for the web's TS sheet types (T126) and mirrors the Kotlin sealed
    # `CharacterData` (T122). The DnD35 field list is the Phase 3C content (tasks T105–T114).
    Sheet:
      oneOf:
        - $ref: "#/components/schemas/DnD35Sheet"
        - $ref: "#/components/schemas/DarkSoulsSheet"
      discriminator:
        propertyName: ruleSetId
        mapping:
          dnd35: "#/components/schemas/DnD35Sheet"
          darksouls: "#/components/schemas/DarkSoulsSheet"
      description: >-
        A resolved sheet for one rule set. In a response it carries base inputs plus derived values
        (`readOnly`, computed on read, never persisted); on a request only base inputs are read. The
        `ruleSetId` property is the polymorphic discriminator (Jackson `@JsonTypeInfo`, wire-only — it
        deliberately duplicates the resource's top-level `ruleSetId`, which is what queries/indexes use).
    DnD35Sheet:
      type: object
      description: "D&D 3.5 sheet (ADR-001; content = tasks T105–T114). `readOnly` = derived, recomputed on read."
      properties:
        ruleSetId: { const: dnd35, description: "discriminator" }
        # identity
        name: { type: string }
        player: { type: string }
        race: { type: string }
        class: { type: string }
        alignment: { type: string, description: "select" }
        deity: { type: string }
        size: { type: string, description: "select" }
        level: { type: integer }
        experience: { type: integer }
        # abilities — scores are base inputs, *Mod are derived
        strength: { type: integer }
        dexterity: { type: integer }
        constitution: { type: integer }
        intelligence: { type: integer }
        wisdom: { type: integer }
        charisma: { type: integer }
        strMod: { type: integer, readOnly: true }
        dexMod: { type: integer, readOnly: true }
        conMod: { type: integer, readOnly: true }
        intMod: { type: integer, readOnly: true }
        wisMod: { type: integer, readOnly: true }
        chaMod: { type: integer, readOnly: true }
        # combat
        hpMax: { type: integer }
        hpCurrent: { type: integer }
        baseAttackBonus: { type: integer }
        grappleSizeMod: { type: integer, description: "grapple special-size scale (Small −4, Large +4) — distinct from sizeMod" }
        initiative: { type: integer, readOnly: true }
        grapple: { type: integer, readOnly: true }
        # defense — bonuses are base inputs, AC values derived
        armorBonus: { type: integer }
        shieldBonus: { type: integer }
        naturalArmor: { type: integer }
        deflection: { type: integer }
        dodge: { type: integer }
        sizeMod: { type: integer, description: "AC/attack size scale (Small +1, Large −1)" }
        armorClass: { type: integer, readOnly: true }
        touchAC: { type: integer, readOnly: true }
        flatFootedAC: { type: integer, readOnly: true }
        # saves — base entered, total derived
        fortBase: { type: integer }
        refBase: { type: integer }
        willBase: { type: integer }
        fortitude: { type: integer, readOnly: true }
        reflex: { type: integer, readOnly: true }
        will: { type: integer, readOnly: true }
        # tables
        attacks: { type: array, items: { $ref: "#/components/schemas/DnD35AttackRow" } }
        skills:
          type: array
          items: { $ref: "#/components/schemas/DnD35SkillRow" }
          description: "canonical 3.5 skills seeded; users may append subtyped rows (Craft/Knowledge/…)"
        feats: { type: array, items: { $ref: "#/components/schemas/DnD35FeatRow" } }
        gear: { type: array, items: { $ref: "#/components/schemas/DnD35GearRow" } }
        totalWeight: { type: integer, readOnly: true, description: "sum of gear weight" }
        languages: { type: array, items: { type: string } }
        notes: { type: string }
        # spellcasting
        casterClass: { type: string }
        casterLevel: { type: integer }
        spellKeyAbility: { type: string, description: "select: an ability-mod id, e.g. intMod" }
        spellSaveDcBase: { type: integer, readOnly: true, description: "10 + key-ability mod; a level-N spell's DC = base + N" }
        spellSlots: { type: array, items: { $ref: "#/components/schemas/DnD35SpellSlotRow" } }
        spells: { type: array, items: { $ref: "#/components/schemas/DnD35SpellRow" } }
    DnD35AttackRow:
      type: object
      properties:
        weapon: { type: string }
        ability: { type: string, description: "select: ability-mod id used for the attack (e.g. strMod)" }
        misc: { type: integer }
        attackBonus: { type: integer, readOnly: true, description: "baseAttackBonus + chosen ability mod + misc" }
        damage: { type: string }
        critical: { type: string }
        range: { type: string }
        notes: { type: string }
    DnD35SkillRow:
      type: object
      properties:
        skill: { type: string }
        keyAbility: { type: string, description: "select: ability-mod id (read-only on preset rows)" }
        ranks: { type: integer }
        classSkill: { type: boolean }
        misc: { type: integer }
        total: { type: integer, readOnly: true, description: "ranks + key-ability mod + misc" }
    DnD35FeatRow:
      type: object
      properties:
        name: { type: string }
        type: { type: string, enum: [general, combat, metamagic, itemCreation] }
        description: { type: string }
    DnD35GearRow:
      type: object
      properties:
        item: { type: string }
        quantity: { type: integer }
        weight: { type: integer }
        notes: { type: string }
    DnD35SpellSlotRow:
      type: object
      description: "One row per spell level 0–9 (preset). slotsPerDay entered; bonus/total derived."
      properties:
        spellLevel: { type: integer }
        slotsPerDay: { type: integer }
        bonusSpells: { type: integer, readOnly: true }
        total: { type: integer, readOnly: true, description: "slotsPerDay + bonusSpells" }
        known: { type: integer }
        prepared: { type: integer }
    DnD35SpellRow:
      type: object
      properties:
        spell: { type: string, description: "spell id from the class-filtered spells catalog" }
        level: { type: integer, description: "spell level for the caster class (catalog-supplied)" }
        prepared: { type: integer }
        notes: { type: string }
    DarkSoulsSheet:
      type: object
      description: "Stub variant (ADR-001) — present so the union and the Kotlin sealed `when`s are total. US5 (tasks T072–T075) fleshes it."
      properties:
        ruleSetId: { const: darksouls, description: "discriminator" }
    CharacterSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        ruleSetId: { type: string }
    Character:
      allOf:
        - $ref: "#/components/schemas/CharacterSummary"
        - type: object
          properties:
            ownerId: { type: string }
            data: { $ref: "#/components/schemas/Sheet" }
            warnings: { type: array, items: { $ref: "#/components/schemas/RuleWarning" } }
            version: { type: integer }
    CampaignSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        ruleSetId: { type: string }
        status: { type: string, enum: [active, archived] }
        role: { type: string, enum: [dm, player], description: The caller's role in this campaign }
    Campaign:
      allOf:
        - $ref: "#/components/schemas/CampaignSummary"
        - type: object
          properties:
            dmId: { type: string }
            rolls: { type: array, items: { $ref: "#/components/schemas/Roll" }, description: "Campaign-scoped rolls (embedded; not tied to a session/encounter)" }
            version: { type: integer }
    CampaignView:
      type: object
      description: Role-aware detail — DM gets full data; player gets self + shared only
      properties:
        campaign: { $ref: "#/components/schemas/Campaign" }
        members: { type: array, items: { $ref: "#/components/schemas/Member" } }
        sharedContent: { type: array, items: { $ref: "#/components/schemas/Content" } }
        activeEncounter: { $ref: "#/components/schemas/Encounter" }
    Member:
      type: object
      properties:
        id: { type: string }
        campaignId: { type: string }
        characterId: { type: string }
        playerId: { type: string }
        characterName: { type: string }
    Npc:
      type: object
      properties:
        id: { type: string }
        campaignId: { type: string }
        name: { type: string }
        ruleSetId: { type: string }
        data: { $ref: "#/components/schemas/Sheet" }
        isPrivate: { type: boolean }
        version: { type: integer }
    Content:
      type: object
      properties:
        id: { type: string }
        campaignId: { type: string }
        title: { type: string }
        body: { type: string }
        visibility: { type: string, enum: [private, shared] }
        version: { type: integer }
    Session:
      type: object
      description: "Own collection, referencing its campaign; loaded separately when assembling the campaign view"
      properties:
        id: { type: string }
        campaignId: { type: string }
        title: { type: string }
        scheduledFor: { type: string, format: date-time, nullable: true }
        notes: { type: string }
        status: { type: string, enum: [planned, completed] }
        rolls: { type: array, items: { $ref: "#/components/schemas/Roll" }, description: "Session-scoped rolls (embedded)" }
        version: { type: integer }
    Encounter:
      type: object
      description: "Own collection; references its session and campaign, assembled into the campaign view at read time"
      properties:
        id: { type: string }
        sessionId: { type: string }
        campaignId: { type: string, description: "denormalized parent campaign, for per-campaign scoping" }
        status: { type: string, enum: [pending, active, ended] }
        round: { type: integer }
        currentTurn: { type: integer }
        combatants:
          type: array
          items:
            type: object
            properties:
              id: { type: string, description: the combatant entry's own id }
              combatantId: { type: string, description: id of the referenced character or NPC }
              combatantType: { type: string, enum: [character, npc] }
              name: { type: string }
              initiative: { type: integer }
              isRevealed: { type: boolean }
        rolls: { type: array, items: { $ref: "#/components/schemas/Roll" }, description: "Encounter-scoped rolls (embedded)" }
        version: { type: integer }
    Roll:
      type: object
      description: "Embedded in its container's rolls[] (campaign/session/encounter); scope is the container, so no campaignId/sessionId/encounterId fields"
      properties:
        id: { type: string }
        initiatorId: { type: string, description: "Hive subject who initiated the roll" }
        expression: { type: string }
        results: { type: array, items: { type: integer } }
        total: { type: integer }
        appliedTo:
          type: object
          nullable: true
          properties:
            targetType: { type: string }
            targetId: { type: string }
            field: { type: string }
    RollRequest:
      type: object
      required: [expression]
      description: "Roll-creation body; the container (campaign/session/encounter) is given by the URL path"
      properties:
        expression: { type: string, examples: ["2d6+3", "4d6kh3", "1d20+5"] }
        applyTo:
          type: object
          description: Optional target; applied through the normal sheet-write path (soft warnings apply)
          properties:
            targetType: { type: string, enum: [character, npc] }
            targetId: { type: string }
            field: { type: string, examples: ["hp_current"] }
    StreamEvent:
      type: object
      description: Envelope for SSE frames on /campaigns/{id}/stream
      properties:
        type: { type: string, enum: [sheet.updated, content.updated, roster.updated, combat.updated, roll.created] }
        campaignId: { type: string }
        data: { type: object, description: Authorized projection of the changed resource }
